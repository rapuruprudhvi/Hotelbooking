<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        404 - Page Not Found | Stackly Resort
    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Error CSS -->

    <link
        rel="stylesheet"
        href="css/error.css">
    <style>
        /* ==========================================
   PREMIUM ERROR PAGE
========================================== */

.error-section{

    min-height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,.80),
        rgba(0,0,0,.80)
    ),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1800&q=80');

    background-size:cover;
    background-position:center;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;

    color:#ffffff;

    padding:30px;
}

/* Glassmorphism Card */

.error-content{

    max-width:850px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);

    padding:60px;

    border-radius:30px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.35);

}

/* 404 Text */

.error-content h1{

    font-size:180px;

    font-weight:900;

    color:#d4af37;

    line-height:1;

    text-shadow:
    0 0 20px rgba(212,175,55,.4);

}

/* Heading */

.error-content h2{

    font-size:48px;

    font-weight:800;

    margin:20px 0;

}

/* Description */

.error-content p{

    max-width:650px;

    margin:auto;

    margin-bottom:30px;

    color:#e0e0e0;

    font-size:18px;

    line-height:1.9;

}

/* Hotel Icon */

.error-icon{

    font-size:80px;

    color:#d4af37;

    margin-bottom:35px;

    animation:floatIcon 3s ease infinite;

}

/* Floating Animation */

@keyframes floatIcon{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }

}

/* Buttons */

.error-buttons{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;

}

/* Home Button */

.home-btn{

    min-width:220px;

    background:#d4af37;

    color:#111111;

    text-decoration:none;

    padding:15px 30px;

    border-radius:50px;

    font-weight:700;

    transition:.4s;

}

.home-btn:hover{

    background:#c39d2a;

    transform:translateY(-5px);

    color:#111111;

}

/* Previous Button */

.previous-btn{

    min-width:220px;

    border:2px solid #ffffff;

    background:transparent;

    color:#ffffff;

    padding:15px 30px;

    border-radius:50px;

    font-weight:700;

    cursor:pointer;

    transition:.4s;

}

.previous-btn:hover{

    background:#ffffff;

    color:#111111;

    transform:translateY(-5px);

}

/* Mobile */

@media(max-width:768px){

    .error-content{

        padding:40px 25px;

    }

    .error-content h1{

        font-size:120px;

    }

    .error-content h2{

        font-size:32px;

    }

}

@media(max-width:576px){

    .error-content h1{

        font-size:90px;

    }

    .error-content h2{

        font-size:26px;

    }

    .home-btn,
    .previous-btn{

        width:100%;

    }

}
    </style>
            
      

</head>

<body>


    <section class="error-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="error-content">

                        <h1>
                            404
                        </h1>

                        <h2>
                            Oops! Page Not Found
                        </h2>

                        <p>

                            The page you are looking for
                            might have been removed,
                            renamed or is temporarily
                            unavailable.

                        </p>

                        <div class="error-icon">

                            <i class="fa-solid fa-hotel"></i>

                        </div>

                    <div class="error-buttons">

    <a href="index.html" class="home-btn">

        <i class="fa-solid fa-house"></i>
        Back To Home

    </a>

    <button
        class="previous-btn"
        onclick="history.back()">

        <i class="fa-solid fa-arrow-left"></i>
        Previous Page

    </button>

</div>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
